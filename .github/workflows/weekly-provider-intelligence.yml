name: Weekly Provider Intelligence

on:
  schedule:
    - cron: "0 14 * * 1"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.3

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Install Super Saiyan Browser
        run: python -m pip install -e .

      - name: Run weekly provider intelligence
        run: python scripts/weekly-provider-intelligence.py --apply --verify --commit
