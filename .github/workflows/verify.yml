name: Verify Super Saiyan Browser

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.3

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Super Saiyan Browser
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[playwright]"
          python -m playwright install chromium

      - name: Run verification suite
        run: ./scripts/verify-super-browser

  verify-minimal:
    # Base install WITHOUT the [playwright] extra. Exercises the no-provider-SDK
    # path real users hit with `pip install super-browser`, so a readiness probe
    # that assumes Playwright is importable can never ship green again.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.3

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.10"

      - name: Install Super Saiyan Browser (base only, no extras)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Diagnostics must work without Playwright installed
        run: |
          super-browser doctor
          super-browser env-checklist
          super-browser providers
          super-browser production-readiness || true
