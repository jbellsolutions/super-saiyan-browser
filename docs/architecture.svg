    <path d="M55,207 L55,319" stroke="#10b981" stroke-width="1.5" stroke-dasharray="3,5" fill="none"/>
    <path d="M55,319 L55,431" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="3,5" fill="none"/>
    <path d="M55,431 L55,543" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="3,5" fill="none"/>
