  <text x="834" y="247" fill="#94a3b8" font-size="7" opacity="0.5" transform="rotate(-90, 834, 247)">FALLBACK</text>
  <text x="834" y="359" fill="#94a3b8" font-size="7" opacity="0.5" transform="rotate(-90, 834, 359)">FALLBACK</text>
  <text x="834" y="471" fill="#94a3b8" font-size="7" opacity="0.5" transform="rotate(-90, 834, 471)">FALLBACK</text>

